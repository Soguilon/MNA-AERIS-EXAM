<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 7 MAPEH Quiz: Music, Arts, PE & Health</title>
<style>
  * {
    box-sizing: border-box;
  }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #ffffff;
    color: #000000;
    margin: 0;
    padding: 0;
  }
  .container {
    max-width: 700px;
    margin: 20px auto;
    padding: 20px;
    border: 2px solid #000000;
  }
  h1 {
    text-align: center;
    font-size: 1.4em;
    border-bottom: 2px solid #000000;
    padding-bottom: 10px;
    margin-top: 0;
  }
  .progress {
    text-align: center;
    margin-bottom: 15px;
    font-size: 0.95em;
  }
  .question-box {
    border: 1px solid #000000;
    padding: 15px;
    margin-bottom: 15px;
    min-height: 60px;
  }
  .question-text {
    font-size: 1.15em;
    font-weight: bold;
    margin-bottom: 10px;
  }
  .options {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .options li {
    border: 1px solid #000000;

    margin-bottom: 8px;
    cursor: pointer;
  }
  .options li:hover {
    background: #f0f0f0;
  }
  .options li.selected {
    background: #000000;
    color: #ffffff;
  }
  .nav-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
    gap: 10px;
  }
  button {
    font-family: inherit;
    background: #ffffff;
    color: #000000;
    border: 2px solid #000000;
    padding: 10px 18px;
    cursor: pointer;
    font-size: 1em;
  }
  button:hover:not(:disabled) {
    background: #000000;
    color: #ffffff;
  }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .center-btn {
    display: block;
    margin: 20px auto 0 auto;
  }
  .results {
    text-align: center;
  }
  .results h2 {
    border-bottom: 2px solid #000000;
    padding-bottom: 10px;
  }
  .score-line {
    font-size: 1.3em;
    margin: 10px 0;
  }
  .review-item {
    border: 1px solid #000000;
    padding: 10px;
    margin-bottom: 8px;
    text-align: left;
  }
  .review-item.correct {
    border-left: 6px solid #000000;
  }
  .review-item.incorrect {
    border-left: 6px solid #000000;
    background: #eeeeee;
  }
  .review-item p {
    margin: 4px 0;
  }
  .label-correct::before {
    content: "✔ ";
  }
  .label-incorrect::before {
    content: "✘ ";
  }
  .hidden {
    display: none;
  }
  @media (max-width: 600px) {
    .container {
      margin: 10px;
      padding: 12px;
    }
    h1 {
      font-size: 1.1em;
    }
    .question-text {
      font-size: 1em;
    }
    button {
      padding: 8px 12px;
      font-size: 0.9em;
    }
    .nav-buttons {
      flex-wrap: wrap;
    }
  }
</style>
</head>
<body>

<div class="container">
  <h1>Grade 7 MAPEH Quiz</h1>

    <div class="progress" id="progressText"></div>
    <div class="question-box">
      <div class="question-text" id="questionText"></div>
      <ul class="options" id="optionsList"></ul>
    </div>
    <div class="nav-buttons">
      <button id="prevBtn">Previous</button>
      <button id="nextBtn">Next</button>

  <div id="resultsScreen" class="results hidden">
    <h2>Quiz Complete</h2>
    <div class="score-line" id="scoreLine"></div>
    <div class="score-line" id="percentLine"></div>
    <div id="reviewList"></div>
    <button class="center-btn" id="restartBtn">Restart Quiz</button>
  </div>
</div>

  },
  {

  },
  {

  {

  {

  {

      "The immediate care given to an injured or sick person before professional help arrives",

    ],
    correct: "The immediate care given to an injured or sick person before professional help arrives"

  {
    question: "Body Mass Index (BMI) is used to:",
    options: [
      "Assess if a person's weight is healthy relative to their height",
      "Measure a person's flexibility",
      "Measure a person's reaction time",
      "Measure how fast a person can run"
    ],
    correct: "Assess if a person's weight is healthy relative to their height"
  }
];

// ---------- State ----------
let quiz = [];      // shuffled working copy with shuffled options
let currentIndex = 0;
let userAnswers = []; // stores selected option string per question, or null

// ---------- Utility ----------
function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuiz() {
  const shuffledQuestions = shuffleArray(questionBank);
  quiz = shuffledQuestions.map(q => {
    return {
      question: q.question,
      options: shuffleArray(q.options),
      correct: q.correct
    };
  });
  userAnswers = new Array(quiz.length).fill(null);
  currentIndex = 0;
}

// ---------- DOM Elements ----------
const quizScreen = document.getElementById('quizScreen');
const resultsScreen = document.getElementById('resultsScreen');
const progressText = document.getElementById('progressText');
const questionText = document.getElementById('questionText');
const optionsList = document.getElementById('optionsList');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const scoreLine = document.getElementById('scoreLine');
const percentLine = document.getElementById('percentLine');
const reviewList = document.getElementById('reviewList');
const restartBtn = document.getElementById('restartBtn');

// ---------- Render ----------
function renderQuestion() {
  const q = quiz[currentIndex];
  progressText.textContent = "Question " + (currentIndex + 1) + " of " + quiz.length;
  questionText.textContent = q.question;
  optionsList.innerHTML = "";

  q.options.forEach(opt => {
    const li = document.createElement('li');
    li.textContent = opt;
    if (userAnswers[currentIndex] === opt) {
      li.classList.add('selected');
    }
    li.addEventListener('click', () => {
      userAnswers[currentIndex] = opt;
      renderQuestion();
    });
    optionsList.appendChild(li);
  });

  prevBtn.disabled = currentIndex === 0;
  nextBtn.textContent = (currentIndex === quiz.length - 1) ? "Finish" : "Next";
}

function showResults() {
  quizScreen.classList.add('hidden');
  resultsScreen.classList.remove('hidden');

  let correctCount = 0;
  reviewList.innerHTML = "";

  quiz.forEach((q, i) => {
    const userAns = userAnswers[i];
    const isCorrect = userAns === q.correct;
    if (isCorrect) correctCount++;

    const div = document.createElement('div');
    div.className = 'review-item ' + (isCorrect ? 'correct' : 'incorrect');

    const qP = document.createElement('p');
    qP.innerHTML = "<strong>Q" + (i + 1) + ":</strong> " + q.question;
    div.appendChild(qP);

    const yourP = document.createElement('p');
    yourP.className = isCorrect ? 'label-correct' : 'label-incorrect';
    yourP.textContent = "Your answer: " + (userAns !== null ? userAns : "(no answer)");
    div.appendChild(yourP);

    if (!isCorrect) {
      const corrP = document.createElement('p');
      corrP.textContent = "Correct answer: " + q.correct;
      div.appendChild(corrP);
    }

    reviewList.appendChild(div);
  });

  const percent = Math.round((correctCount / quiz.length) * 100);
  scoreLine.textContent = "You got " + correctCount + " out of " + quiz.length + " correct.";
  percentLine.textContent = "Score: " + percent + "%";
}

// ---------- Navigation ----------
prevBtn.addEventListener('click', () => {
  if (currentIndex > 0) {
    currentIndex--;
    renderQuestion();
  }
});

nextBtn.addEventListener('click', () => {
  if (currentIndex < quiz.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    showResults();
  }
});

restartBtn.addEventListener('click', () => {
  resultsScreen.classList.add('hidden');
  quizScreen.classList.remove('hidden');
  buildQuiz();
  renderQuestion();
});

// ---------- Init ----------
buildQuiz();
renderQuestion();
</script>

</body>
</html>
